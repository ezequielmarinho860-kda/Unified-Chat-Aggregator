<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unified Chat Aggregator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="dashboard">
        <div class="dashboard__header">
          <p class="eyebrow">Bloco 1</p>
          <h1>Unified Chat Aggregator</h1>
          <p class="summary">
            Feed em tempo real recebendo mensagens pelo backbone IPC.
          </p>
        </div>

        <div class="status-grid" id="status-grid" aria-label="Status dos connectors">
          <article class="status-card status-card--mock" data-platform="mock">
            <span class="status-card__label">Mock</span>
            <strong data-status-state>Disabled</strong>
            <small data-status-detail>Dev mode</small>
          </article>
          <article class="status-card status-card--twitch" data-platform="twitch">
            <span class="status-card__label">Twitch</span>
            <strong data-status-state>Disabled</strong>
            <small data-status-detail>Anonymous IRC</small>
          </article>
          <article class="status-card status-card--kick" data-platform="kick">
            <span class="status-card__label">Kick</span>
            <strong data-status-state>Disabled</strong>
            <small data-status-detail>Pusher</small>
          </article>
          <article class="status-card status-card--x" data-platform="x">
            <span class="status-card__label">X</span>
            <strong data-status-state>Disabled</strong>
            <small data-status-detail>Use X_LIVE_URL</small>
          </article>
        </div>

        <section class="feed-panel" aria-labelledby="feed-title">
          <div class="feed-panel__header">
            <div>
              <p class="eyebrow">Live feed</p>
              <h2 id="feed-title">Unified messages</h2>
            </div>
            <div class="feed-panel__metrics" aria-label="Feed metrics">
              <span class="feed-panel__counter" id="visible-message-count">0</span>
              <span class="feed-panel__counter feed-panel__counter--muted" id="message-count">0</span>
            </div>
          </div>

          <div class="feed-toolbar" aria-label="Feed controls">
            <div class="platform-filter" id="platform-filter" role="group" aria-label="Platform filter">
              <button class="filter-button is-active" type="button" data-filter-platform="all">All</button>
              <button class="filter-button" type="button" data-filter-platform="mock">Mock</button>
              <button class="filter-button" type="button" data-filter-platform="twitch">Twitch</button>
              <button class="filter-button" type="button" data-filter-platform="kick">Kick</button>
              <button class="filter-button" type="button" data-filter-platform="x">X</button>
            </div>
            <div class="feed-actions">
              <button class="tool-button" type="button" id="toggle-autoscroll">Pause</button>
              <button class="tool-button" type="button" id="clear-feed">Clear</button>
            </div>
          </div>

          <ol class="message-feed" id="message-feed" aria-live="polite">
            <li class="empty-state" id="empty-state">Waiting for messages...</li>
          </ol>
        </section>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
