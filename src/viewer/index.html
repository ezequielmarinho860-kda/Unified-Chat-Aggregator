<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' ws://127.0.0.1:* ws://localhost:*; script-src 'self'; style-src 'self'; img-src 'self' https: data:; frame-src https://player.twitch.tv; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
    <title>Viewer Mode</title>
    <link rel="stylesheet" href="/viewer/viewer-mode.css">
    <script src="/viewer/viewer-transport.js" defer></script>
    <script src="/viewer/viewer-mode.js" defer></script>
  </head>
  <body>
    <main class="viewer-shell">
      <header class="topbar">
        <div class="viewer-status-grid" aria-label="Viewer counts">
          <article class="status-card status-card--twitch" data-viewer-card="twitch" data-viewer-state="unavailable">
            <span class="status-card__label">
              <span class="platform-mark"><img src="/viewer/assets/twitch-glitch.svg" alt=""></span>Twitch
            </span>
            <strong class="status-card__viewer-count" data-viewer-platform-count="twitch">--</strong>
          </article>
          <article class="status-card status-card--kick" data-viewer-card="kick" data-viewer-state="unavailable">
            <span class="status-card__label"><span class="platform-mark platform-mark--kick">K</span>Kick</span>
            <strong class="status-card__viewer-count" data-viewer-platform-count="kick">--</strong>
          </article>
          <article class="status-card status-card--x" data-viewer-card="x" data-viewer-state="unavailable">
            <span class="status-card__label"><span class="platform-mark">X</span>X</span>
            <strong class="status-card__viewer-count" data-viewer-platform-count="x">--</strong>
          </article>
          <article class="status-card status-card--total" data-viewer-card="total" data-viewer-state="available">
            <span class="status-card__label"><span class="platform-mark">+</span>Total</span>
            <strong class="status-card__viewer-count" data-viewer-platform-count="total">0</strong>
          </article>
        </div>
        <div class="connection-card" data-connection-state="loading">
          <span class="status-dot" aria-hidden="true"></span>
          <div>
            <strong data-connection-label>Loading snapshot</strong>
          </div>
        </div>
      </header>

      <section class="layout-grid" aria-label="Viewer layout">
        <article class="panel player-panel" data-player-panel>
          <p class="panel-kicker">Player</p>
          <div class="empty-state">Waiting for a public Twitch player config.</div>
        </article>

        <article class="panel chat-panel">
          <div class="panel-heading">
            <div class="chat-heading-copy">
              <p class="panel-kicker">Combined Chat</p>
              <span class="message-count"><span data-message-count>0</span> live messages seen</span>
            </div>
            <div class="chat-filter-control" role="group" aria-label="Chat platform filter">
              <button class="chat-filter-button is-active" type="button" data-chat-platform-filter="all" aria-pressed="true">
                All
              </button>
              <button class="chat-filter-button is-active" type="button" data-chat-platform-filter="twitch" aria-pressed="true">
                Twitch
              </button>
              <button class="chat-filter-button is-active" type="button" data-chat-platform-filter="kick" aria-pressed="true">
                Kick
              </button>
              <button class="chat-filter-button is-active" type="button" data-chat-platform-filter="x" aria-pressed="true">
                X
              </button>
              <button class="chat-filter-button is-active" type="button" data-chat-platform-filter="local" aria-pressed="true">
                Local
              </button>
            </div>
          </div>
          <section class="local-chat-controls" aria-label="Local chat">
            <form class="local-auth-form" data-local-auth-form>
              <label>
                <span class="visually-hidden">Email</span>
                <input name="email" type="email" autocomplete="email" placeholder="Email">
              </label>
              <label>
                <span class="visually-hidden">Nick</span>
                <input name="nick" type="text" autocomplete="nickname" maxlength="24" placeholder="Nick">
              </label>
              <button class="local-chat-button" type="submit" data-local-auth-action="register">
                Join
              </button>
              <button class="local-chat-button local-chat-button--secondary" type="submit" data-local-auth-action="login">
                Login
              </button>
              <button class="local-chat-button local-chat-button--secondary" type="button" data-local-google-login hidden>
                Google
              </button>
            </form>
            <div class="local-session-panel" data-local-session-panel hidden>
              <strong data-local-session-label></strong>
              <button class="local-chat-button local-chat-button--secondary" type="button" data-local-logout>
                Logout
              </button>
            </div>
            <form class="local-message-form" data-local-message-form hidden>
              <label>
                <span class="visually-hidden">Local chat message</span>
                <textarea name="text" rows="1" maxlength="500" placeholder="Local chat message"></textarea>
              </label>
              <button class="local-chat-button" type="submit">Send</button>
            </form>
            <div class="local-chat-suggestions" data-local-chat-suggestions hidden></div>
            <p class="local-chat-status" data-local-chat-status aria-live="polite"></p>
          </section>
          <div class="chat-list" data-chat-list aria-live="polite" aria-label="Combined chat messages">
            <div class="empty-state" data-chat-empty>
              Waiting for new public chat messages from the realtime stream.
            </div>
          </div>
          <button class="chat-resume-button" type="button" data-resume-chat hidden>
            New messages
          </button>
        </article>
      </section>
    </main>
  </body>
</html>
