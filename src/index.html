<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unified Chat Aggregator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="dashboard">
        <div class="dashboard__header">
          <p class="eyebrow">Bloco 1</p>
          <h1>Unified Chat Aggregator</h1>
          <p class="summary">
            Feed em tempo real recebendo mensagens pelo backbone IPC.
          </p>
        </div>

        <div class="status-grid" aria-label="Status dos connectors">
          <article class="status-card status-card--twitch">
            <span class="status-card__label">Twitch</span>
            <strong>IRC anonimo ativo</strong>
          </article>
          <article class="status-card status-card--kick">
            <span class="status-card__label">Kick</span>
            <strong>Pusher leitura configurada</strong>
          </article>
          <article class="status-card status-card--x">
            <span class="status-card__label">X</span>
            <strong>Connector pendente</strong>
          </article>
        </div>

        <section class="feed-panel" aria-labelledby="feed-title">
          <div class="feed-panel__header">
            <div>
              <p class="eyebrow">Live feed</p>
              <h2 id="feed-title">Mensagens unificadas</h2>
            </div>
            <span class="feed-panel__counter" id="message-count">0</span>
          </div>

          <ol class="message-feed" id="message-feed" aria-live="polite"></ol>
        </section>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
