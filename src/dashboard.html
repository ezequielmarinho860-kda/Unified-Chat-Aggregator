<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unified Chat Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="dashboard-view">
    <main class="chat-window">
      <header class="status-grid" id="status-grid" aria-label="Connector status">
        <article class="status-card status-card--twitch" data-platform="twitch">
          <span class="status-card__label">
            <span class="platform-mark"><img src="./assets/twitch-glitch.svg" alt="" /></span>Twitch
          </span>
          <strong class="status-card__viewer-count" data-viewer-count>--</strong>
          <small class="visually-hidden" data-viewer-detail>Loading viewers...</small>
          <span class="visually-hidden" data-status-state>Disabled</span>
          <span class="visually-hidden" data-status-detail>Anonymous IRC</span>
        </article>
        <article class="status-card status-card--kick" data-platform="kick">
          <span class="status-card__label"><span class="platform-mark platform-mark--kick">K</span>Kick</span>
          <strong class="status-card__viewer-count" data-viewer-count>--</strong>
          <small class="visually-hidden" data-viewer-detail>Loading viewers...</small>
          <span class="visually-hidden" data-status-state>Disabled</span>
          <span class="visually-hidden" data-status-detail>Pusher</span>
        </article>
        <article class="status-card status-card--x" data-platform="x">
          <span class="status-card__label">
            <span class="platform-mark"><img src="./assets/x-logo.svg" alt="" /></span>X
          </span>
          <strong class="status-card__viewer-count" data-viewer-count>--</strong>
          <small class="visually-hidden" data-viewer-detail>Searching live page...</small>
          <span class="visually-hidden" data-status-state>Disabled</span>
          <span class="visually-hidden" data-status-detail>Live capture</span>
        </article>
        <article class="status-card status-card--total">
          <span class="status-card__label"><span class="platform-mark">+</span>Total</span>
          <strong class="status-card__viewer-count" id="total-viewer-count">0</strong>
          <small class="visually-hidden">Combined available viewers</small>
        </article>
      </header>

      <section class="feed-panel" aria-labelledby="feed-title">
        <div class="feed-panel__header">
          <p class="eyebrow" id="feed-title">Live feed</p>
          <div class="platform-filter" id="platform-filter" role="group" aria-label="Platform filter">
            <button class="filter-button filter-button--compact is-active" type="button" data-filter-platform="all">All</button>
            <button class="filter-button filter-button--compact" type="button" data-filter-platform="twitch">Twitch</button>
            <button class="filter-button filter-button--compact" type="button" data-filter-platform="kick">Kick</button>
            <button class="filter-button filter-button--compact" type="button" data-filter-platform="x">X</button>
          </div>
          <div class="feed-actions">
            <button class="tool-button tool-button--compact" type="button" id="clear-feed">Clear</button>
          </div>
        </div>

        <ol class="message-feed" id="message-feed" aria-live="polite">
          <li class="empty-state" id="empty-state">Waiting for messages...</li>
        </ol>
        <button class="new-message-button" type="button" id="resume-chat" hidden>
          Novas mensagens
        </button>

        <form class="composer-panel" id="message-composer" aria-label="Send message">
          <label class="composer-panel__target">
            <span class="visually-hidden">Send to</span>
            <select name="platform">
              <option value="twitch">Twitch</option>
              <option value="kick">Kick</option>
              <option value="x">X</option>
            </select>
          </label>
          <label class="composer-panel__message">
            <span class="visually-hidden">Message</span>
            <textarea name="text" rows="1" maxlength="500" placeholder="Write a message"></textarea>
          </label>
          <button class="tool-button tool-button--primary" type="submit">Send</button>
          <p class="visually-hidden" id="composer-meta" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="./message-highlights.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
