<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connector Setup</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="setup-view">
    <main class="app-shell">
      <section class="dashboard">
        <header class="dashboard__header">
          <p class="eyebrow">Connections</p>
          <h1>Connector setup</h1>
          <p class="summary">Choose the platforms and appearance used by your dashboard.</p>
        </header>

        <section class="config-panel" aria-labelledby="config-title">
          <div class="config-panel__header">
            <div>
              <p class="eyebrow">Configuration</p>
              <h2 id="config-title">Streams and accounts</h2>
            </div>
            <div class="config-panel__actions">
              <button class="tool-button" type="button" id="restart-connectors">Reconnect</button>
              <button class="tool-button tool-button--primary" type="submit" form="connector-config-form">Save</button>
            </div>
          </div>

          <form class="connector-form" id="connector-config-form">
            <fieldset class="connector-settings connector-settings--appearance">
              <legend>Appearance</legend>
              <label class="field-row">
                <span>Theme</span>
                <select name="ui.theme">
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                </select>
              </label>
              <p class="connector-settings__note">Applies to setup and dashboard after saving.</p>
            </fieldset>

            <fieldset class="connector-settings connector-settings--twitch">
              <legend>Twitch</legend>
              <label class="toggle-row">
                <input type="checkbox" name="twitch.enabled" />
                <span>Enabled</span>
              </label>
              <label class="field-row">
                <span>Primary channel</span>
                <input type="text" name="twitch.channel" autocomplete="off" />
              </label>
              <label class="field-row">
                <span>Second channel</span>
                <input type="text" name="twitch.channel2" autocomplete="off" placeholder="Optional" />
              </label>
              <div class="auth-actions" data-twitch-auth>
                <span class="auth-actions__status" id="twitch-auth-status">Not connected</span>
                <button class="tool-button" type="button" id="connect-twitch">Connect Twitch</button>
                <button class="tool-button" type="button" id="disconnect-twitch" hidden>Disconnect</button>
                <button class="tool-button" type="button" id="clear-twitch-session">Clear login session</button>
              </div>
            </fieldset>

            <fieldset class="connector-settings connector-settings--kick">
              <legend>Kick</legend>
              <label class="toggle-row">
                <input type="checkbox" name="kick.enabled" />
                <span>Enabled</span>
              </label>
              <label class="field-row">
                <span>Primary channel</span>
                <input type="text" name="kick.channel" autocomplete="off" placeholder="xqc or kick.com/xqc" />
              </label>
              <label class="field-row">
                <span>Second channel</span>
                <input type="text" name="kick.channel2" autocomplete="off" placeholder="Optional" />
              </label>
              <div class="auth-actions" data-kick-auth>
                <span class="auth-actions__status" id="kick-auth-status">Not connected</span>
                <button class="tool-button" type="button" id="connect-kick">Connect Kick</button>
                <button class="tool-button" type="button" id="disconnect-kick" hidden>Disconnect</button>
                <button class="tool-button" type="button" id="clear-kick-session">Clear login session</button>
              </div>
            </fieldset>

            <fieldset class="connector-settings connector-settings--x">
              <legend>X</legend>
              <label class="toggle-row">
                <input type="checkbox" name="x.enabled" />
                <span>Enabled</span>
              </label>
              <label class="field-row">
                <span>Primary live handle or URL</span>
                <input type="text" name="x.liveUrl" autocomplete="off" placeholder="@chooserich" />
              </label>
              <label class="field-row">
                <span>Second live handle or URL</span>
                <input type="text" name="x.liveUrl2" autocomplete="off" placeholder="Optional" />
              </label>
              <label class="toggle-row">
                <input type="checkbox" name="x.showBrowser" />
                <span>Show capture window</span>
              </label>
              <div class="auth-actions" data-x-auth>
                <span class="auth-actions__status" id="x-auth-status">Uses browser session</span>
                <button class="tool-button" type="button" id="connect-x">Connect X</button>
                <button class="tool-button" type="button" id="disconnect-x" hidden>Disconnect</button>
              </div>
            </fieldset>
          </form>

          <p class="config-panel__meta" id="config-meta">Loading configuration...</p>
        </section>
      </section>
    </main>
    <script src="./message-highlights.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
