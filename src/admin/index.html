<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
    <title>Admin</title>
    <link rel="stylesheet" href="/admin/admin-mode.css">
    <script src="/admin/admin-mode.js" defer></script>
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-topbar">
        <div>
          <p class="admin-kicker">Unified Chat</p>
          <h1>Admin</h1>
        </div>
        <div class="session-pill" data-session-state="loading">
          <span class="status-dot" aria-hidden="true"></span>
          <strong data-session-label>Checking session</strong>
        </div>
      </header>

      <section class="admin-layout" aria-label="Admin workspace">
        <form class="login-panel" data-login-form>
          <div>
            <p class="admin-kicker">Private Access</p>
            <h2>Sign in</h2>
          </div>
          <label class="field">
            <span>Admin token</span>
            <input name="token" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Sign in</button>
          <p class="form-message" data-login-message role="status"></p>
        </form>

        <section class="session-panel" data-session-panel hidden>
          <div>
            <p class="admin-kicker">Session</p>
            <h2>Admin session active</h2>
          </div>
          <p class="session-copy">Browser-only configuration is stored on the backend.</p>
          <button class="secondary-button" type="button" data-logout-button>Sign out</button>
        </section>

        <section class="moderators-panel" data-moderators-panel hidden>
          <div>
            <p class="admin-kicker">Moderation</p>
            <h2>Moderators</h2>
          </div>
          <form class="moderator-form" data-moderator-form>
            <label class="field">
              <span>Email</span>
              <input name="email" type="email" autocomplete="off">
            </label>
            <label class="field">
              <span>Nick</span>
              <input name="nick" type="text" autocomplete="off">
            </label>
            <button type="submit">Add mod</button>
          </form>
          <div class="moderator-list" data-moderator-list></div>
          <p class="form-message" data-moderators-message role="status"></p>
        </section>

        <form class="config-panel" data-config-form hidden>
          <div>
            <p class="admin-kicker">Viewer</p>
            <h2>Public viewer</h2>
          </div>
          <label class="field">
            <span>Title</span>
            <input name="viewer.title" type="text" autocomplete="off" required>
          </label>
          <div class="inline-fields">
            <label class="field">
              <span>Theme</span>
              <select name="viewer.theme">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
              </select>
            </label>
            <label class="check-field">
              <input name="viewer.showExternalChats" type="checkbox">
              <span>Show external chats</span>
            </label>
          </div>

          <section class="source-section" aria-label="Twitch sources">
            <div>
              <p class="admin-kicker">Twitch</p>
              <h3>Sources</h3>
            </div>
            <div class="source-grid">
              <label class="check-field">
                <input name="sources.twitch.0.enabled" type="checkbox">
                <span>Source 1</span>
              </label>
              <label class="field">
                <span>Channel</span>
                <input name="sources.twitch.0.channel" type="text" autocomplete="off">
              </label>
              <label class="check-field">
                <input name="sources.twitch.1.enabled" type="checkbox">
                <span>Source 2</span>
              </label>
              <label class="field">
                <span>Channel</span>
                <input name="sources.twitch.1.channel" type="text" autocomplete="off">
              </label>
            </div>
          </section>

          <section class="source-section" aria-label="Kick sources">
            <div>
              <p class="admin-kicker">Kick</p>
              <h3>Sources</h3>
            </div>
            <div class="source-grid">
              <label class="check-field">
                <input name="sources.kick.0.enabled" type="checkbox">
                <span>Source 1</span>
              </label>
              <label class="field">
                <span>Channel</span>
                <input name="sources.kick.0.channel" type="text" autocomplete="off">
              </label>
              <label class="check-field">
                <input name="sources.kick.1.enabled" type="checkbox">
                <span>Source 2</span>
              </label>
              <label class="field">
                <span>Channel</span>
                <input name="sources.kick.1.channel" type="text" autocomplete="off">
              </label>
            </div>
          </section>

          <section class="source-section" aria-label="X sources">
            <div>
              <p class="admin-kicker">X</p>
              <h3>Sources</h3>
            </div>
            <div class="source-grid">
              <label class="check-field">
                <input name="sources.x.0.enabled" type="checkbox">
                <span>Source 1</span>
              </label>
              <div class="source-field-actions">
                <label class="field">
                  <span>Live URL or handle</span>
                  <input name="sources.x.0.liveUrl" type="text" autocomplete="off">
                </label>
                <button class="secondary-button" type="button" data-x-login="0">Connect X</button>
              </div>
              <label class="check-field">
                <input name="sources.x.1.enabled" type="checkbox">
                <span>Source 2</span>
              </label>
              <div class="source-field-actions">
                <label class="field">
                  <span>Live URL or handle</span>
                  <input name="sources.x.1.liveUrl" type="text" autocomplete="off">
                </label>
                <button class="secondary-button" type="button" data-x-login="1">Connect X</button>
              </div>
            </div>
          </section>

          <div class="form-actions">
            <button type="submit">Save</button>
            <p class="form-message" data-config-message role="status"></p>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
