<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' ws://127.0.0.1:* ws://localhost:*; script-src 'self'; style-src 'self'; img-src 'self' https: data:; frame-src https://player.twitch.tv; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
    <title>Viewer Mode</title>
    <link rel="stylesheet" href="/viewer/viewer-mode.css">
    <script src="/viewer/viewer-mode.js" defer></script>
  </head>
  <body>
    <main class="viewer-shell">
      <header class="topbar">
        <div class="viewer-status-grid" aria-label="Viewer counts">
          <article class="status-card status-card--twitch" data-viewer-card="twitch" data-viewer-state="unavailable">
            <span class="status-card__label">
              <span class="platform-mark"><img src="/viewer/assets/twitch-glitch.svg" alt=""></span>Twitch
            </span>
            <strong class="status-card__viewer-count" data-viewer-platform-count="twitch">--</strong>
          </article>
          <article class="status-card status-card--kick" data-viewer-card="kick" data-viewer-state="unavailable">
            <span class="status-card__label"><span class="platform-mark platform-mark--kick">K</span>Kick</span>
            <strong class="status-card__viewer-count" data-viewer-platform-count="kick">--</strong>
          </article>
          <article class="status-card status-card--x" data-viewer-card="x" data-viewer-state="unavailable">
            <span class="status-card__label"><span class="platform-mark">X</span>X</span>
            <strong class="status-card__viewer-count" data-viewer-platform-count="x">--</strong>
          </article>
          <article class="status-card status-card--total" data-viewer-card="total" data-viewer-state="available">
            <span class="status-card__label"><span class="platform-mark">+</span>Total</span>
            <strong class="status-card__viewer-count" data-viewer-platform-count="total">0</strong>
          </article>
        </div>
        <div class="connection-card" data-connection-state="loading">
          <span class="status-dot" aria-hidden="true"></span>
          <div>
            <strong data-connection-label>Loading snapshot</strong>
          </div>
        </div>
      </header>

      <section class="layout-grid" aria-label="Viewer layout">
        <article class="panel player-panel" data-player-panel>
          <p class="panel-kicker">Player</p>
          <div class="empty-state">Waiting for a public Twitch player config.</div>
        </article>

        <article class="panel chat-panel">
          <div class="panel-heading">
            <p class="panel-kicker">Combined Chat</p>
            <span class="message-count"><span data-message-count>0</span> live messages seen</span>
          </div>
          <div class="chat-list" data-chat-list aria-live="polite" aria-label="Combined chat messages">
            <div class="empty-state" data-chat-empty>
              Waiting for new public chat messages from the realtime gateway.
            </div>
          </div>
          <button class="chat-resume-button" type="button" data-resume-chat hidden>
            New messages
          </button>
        </article>
      </section>
    </main>
  </body>
</html>
